name: Update DSL/Lower-Level Stats

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas lxml

      - name: Run scraper
        run: python scrape_stats.py

      - name: Commit updated stats.json
        run: |
          git config user.name "yankeesfarm-bot"
          git config user.email "actions@github.com"
          git add data/stats.json
          git diff --quiet --cached || git commit -m "Auto-update stats $(date -u +%Y-%m-%d)"
          git push
